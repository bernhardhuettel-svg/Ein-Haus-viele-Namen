<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Community Build – Pro Simulation</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js" type="module"></script>
    <style>
        body { margin:0; background:#f5f5f7; overflow:hidden; font-family: 'Inter', sans-serif; }
        #tooltip {
            position: fixed; pointer-events: none; padding: 10px 15px;
            background: rgba(0,0,0,0.8); color: white; border-radius: 12px;
            font-size: 13px; display: none; z-index: 100; backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>
    <div id="tooltip"></div>
    <div id="container"></div>

    <script type="module">
        import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js";

        // --- KONFIGURATION (Ratio: 1 visueller Stein = 50 Euro) ---
        const TOTAL_STONES = 500000;
        const VISUAL_RATIO = 50; 
        const MAX_INSTANCES = TOTAL_STONES / VISUAL_RATIO; // 10.000 Steine für Max Performance

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf5f5f7);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(20, 15, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.getElementById('container').appendChild(renderer.domElement);

        // Licht-Setup (Studio Qualität)
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(10, 20, 15);
        sun.castShadow = true;
        scene.add(sun);

        // --- INSTANCED MESHES (Einteilung nach Material/Farbe) ---
        const geometry = new THREE.BoxGeometry(0.25, 0.15, 0.15);
        
        const mats = {
            ground: new THREE.MeshStandardMaterial({ color: 0x7db366 }), // Grün
            wall: new THREE.MeshStandardMaterial({ color: 0xffffff }),   // Weiß
            roof: new THREE.MeshStandardMaterial({ color: 0x333333 }),   // Anthrazit
            glass: new THREE.MeshStandardMaterial({ color: 0xade1f5, transparent: true, opacity: 0.6 })
        };

        const meshes = {
            ground: new THREE.InstancedMesh(geometry, mats.ground, 4000),
            wall: new THREE.InstancedMesh(geometry, mats.wall, 4000),
            roof: new THREE.InstancedMesh(geometry, mats.roof, 2000)
        };

        Object.values(meshes).forEach(m => {
            m.castShadow = true;
            m.receiveShadow = true;
            m.instanceMatrix.setUsage(THREE.StaticDrawUsage);
            scene.add(m);
        });

        // --- BAU-LOGIK ---
        let currentBuildIndex = 0;
        const buildQueue = [];

        function generateQueue() {
            const step = 0.28;
            // 1. Garten (Basis)
            for(let i=0; i<3000; i++) {
                const x = (i % 60) * step - 8;
                const z = Math.floor(i / 60) * step - 8;
                buildQueue.push({ pos: [x, 0, z], type: 'ground', name: 'Garten-Stein' });
            }
            // 2. Haus-Wände (L-Form wie im Bild)
            for(let layer=0; layer<20; layer++) {
                for(let p=0; p<150; p++) {
                    let x, z;
                    if(p < 50) { x = p * step - 4; z = -4; }
                    else if(p < 100) { x = 10; z = (p-50) * step - 4; }
                    else { x = -4; z = (p-100) * step - 4; }
                    buildQueue.push({ pos: [x, layer * 0.16 + 0.15, z], type: 'wall', name: 'Ziegel' });
                }
            }
            // 3. Dach
            for(let r=0; r<1000; r++) {
                const layer = Math.floor(r / 50);
                const pos = r % 50;
                buildQueue.push({ pos: [pos * 0.2 - 4, 3.5 + layer * 0.15, (10-layer)*0.1], type: 'roof', name: 'Dachpfanne' });
            }
        }

        generateQueue();

        const dummy = new THREE.Object3D();
        const counts = { ground: 0, wall: 0, roof: 0 };

        function updateBuild(targetIndex) {
            const safeTarget = Math.min(targetIndex, buildQueue.length);
            
            // Zurücksetzen der Zähler für den Neuaufbau der Instanzen
            counts.ground = 0; counts.wall = 0; counts.roof = 0;

            for(let i=0; i < safeTarget; i++) {
                const item = buildQueue[i];
                dummy.position.set(item.pos[0], item.pos[1], item.pos[2]);
                dummy.updateMatrix();
                meshes[item.type].setMatrixAt(counts[item.type]++, dummy.matrix);
            }

            Object.values(meshes).forEach(m => m.instanceMatrix.needsUpdate = true);
            
            // Sende Fortschritt an Hauptseite
            if (window.parent) {
                window.parent.postMessage({
                    type: "HOUSE_PROGRESS",
                    payload: { progress: Math.floor((safeTarget / buildQueue.length) * 100) }
                }, "*");
            }
        }

        // Empfange Spenden-Events
        window.addEventListener('message', (e) => {
            if(e.data.type === 'ADD_STONE') {
                currentBuildIndex += Math.ceil(e.data.amount / VISUAL_RATIO);
                updateBuild(currentBuildIndex);
            }
        });

        // Maus-Steuerung
        let rotation = 0;
        function animate() {
            requestAnimationFrame(animate);
            rotation += 0.002;
            scene.rotation.y = rotation;
            renderer.render(scene, camera);
        }

        // Startzustand (z.B. 100.000 Euro bereits gespendet)
        currentBuildIndex = 2000; 
        updateBuild(currentBuildIndex);
        animate();

        // Tooltip Logik
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(Object.values(meshes));
            const tooltip = document.getElementById('tooltip');
            if(intersects.length > 0) {
                tooltip.style.display = 'block';
                tooltip.style.left = e.clientX + 15 + 'px';
                tooltip.style.top = e.clientY + 15 + 'px';
                tooltip.innerText = "Baustein gesetzt"; // Hier könnte man Namen einfügen
            } else {
                tooltip.style.display = 'none';
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
