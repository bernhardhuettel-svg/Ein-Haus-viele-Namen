<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js" type="module"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #eef2f3; }
        #canvas-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <script type="module">
        import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js";

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf5f5f7);
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 12, 15);
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        scene.add(light);

        // Geometrien für die Instanzen
        const geo = new THREE.BoxGeometry(0.14, 0.08, 0.08);
        const matGround = new THREE.MeshStandardMaterial({ color: 0x7db366 }); // GRÜN
        const matWall = new THREE.MeshStandardMaterial({ color: 0xffffff });   // WEISS
        const matRoof = new THREE.MeshStandardMaterial({ color: 0x333333 });   // ANTHRAZIT

        const mesh = new THREE.InstancedMesh(geo, matWall, 500000);
        scene.add(mesh);

        const dummy = new THREE.Object3D();
        let currentCount = 120000; // Startwert

        function getPos(i) {
            const step = 0.16;
            if (i < 80000) { // Grundstück
                return { x: (i % 282) * step - 22, y: 0, z: Math.floor(i / 282) * step - 22, type: 'ground' };
            }
            const wallI = i - 80000;
            const layer = Math.floor(wallI / 1200);
            const side = wallI % 1200;
            let x=0, z=0;
            if(side < 300) { x = side * step - 8; z = -8; }
            else if(side < 600) { x = 8; z = (side-300) * step - 8; }
            else if(side < 900) { x = (side-600) * step - 8; z = 8; }
            else { x = -8; z = (side-900) * step - 8; }
            return { x, y: layer * 0.09 + 0.1, z, type: layer > 15 ? 'roof' : 'wall' };
        }

        function updateMesh() {
            for (let i = 0; i < currentCount; i++) {
                const p = getPos(i);
                dummy.position.set(p.x, p.y, p.z);
                dummy.updateMatrix();
                mesh.setMatrixAt(i, dummy.matrix);
                
                // Farbe setzen (Instanced Colors)
                let col = new THREE.Color(0xffffff);
                if(p.type === 'ground') col.set(0x7db366);
                if(p.type === 'roof') col.set(0x333333);
                mesh.setColorAt(i, col);
            }
            mesh.instanceMatrix.needsUpdate = true;
            if(mesh.instanceColor) mesh.instanceColor.needsUpdate = true;
        }

        window.addEventListener('message', (e) => {
            if(e.data.type === 'ADD_STONE') {
                currentCount += e.data.amount;
                updateMesh();
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            mesh.rotation.y += 0.001;
            renderer.render(scene, camera);
        }
        updateMesh();
        animate();
    </script>
</body>
</html>
