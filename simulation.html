<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js" type="module"></script>
    <style>body { margin: 0; overflow: hidden; background: #fff; }</style>
</head>
<body>
    <div id="container"></div>
    <script type="module">
        import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js";

        // CONFIG
        const RATIO = 50; // 1 Stein = 50€
        const TOTAL_VISUAL = 10000;
        let currentVisual = 2400; // Start bei 120.000€

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf5f5f7);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(20, 15, 20);
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.getElementById('container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        sun.castShadow = true;
        scene.add(sun);

        // ENGINE
        const geometry = new THREE.BoxGeometry(0.3, 0.15, 0.15);
        const material = new THREE.MeshStandardMaterial({ vertexColors: true });
        const mesh = new THREE.InstancedMesh(geometry, material, TOTAL_VISUAL);
        mesh.castShadow = true;
        scene.add(mesh);

        const dummy = new THREE.Object3D();
        const color = new THREE.Color();

        function getLayout(i) {
            let x, y, z, col;
            if (i < 3000) { // GRUNDSTÜCK
                const grid = 55;
                x = (i % grid) * 0.32 - 8.5;
                z = Math.floor(i / grid) * 0.32 - 8.5;
                y = 0;
                col = "#7db366";
            } else if (i < 8000) { // WÄNDE
                const wI = i - 3000;
                const layer = Math.floor(wI / 250);
                const p = wI % 250;
                y = layer * 0.16 + 0.15;
                if(p < 75) { x = p * 0.3 - 5; z = -5; }
                else if(p < 125) { x = 7.5; z = (p-75) * 0.3 - 5; }
                else if (p < 200) { x = (p-125) * -0.3 + 7.5; z = 5; }
                else { x = -5; z = (p-200) * 0.3 - 5; }
                col = "#ffffff";
            } else { // DACH
                const dI = i - 8000;
                const layer = Math.floor(dI / 100);
                y = 3.4 + layer * 0.15;
                x = (dI % 100) * 0.15 - 7.5;
                z = (10 - layer) * 0.1;
                col = "#333333";
            }
            return { x, y, z, col };
        }

        function build() {
            for (let i = 0; i < TOTAL_VISUAL; i++) {
                const data = getLayout(i);
                if (i < currentVisual) {
                    dummy.position.set(data.x, data.y, data.z);
                } else {
                    dummy.position.set(0, -20, 0);
                }
                dummy.updateMatrix();
                mesh.setMatrixAt(i, dummy.matrix);
                color.set(data.col);
                mesh.setColorAt(i, color);
            }
            mesh.instanceMatrix.needsUpdate = true;
            if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true;
        }

        function animate() {
            requestAnimationFrame(animate);
            mesh.rotation.y += 0.001;
            renderer.render(scene, camera);
        }

        build();
        animate();
    </script>
</body>
</html>
