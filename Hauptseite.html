<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Das Community-LEGO-Haus | Ela & Bernhard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js" type="module"></script>
    
    <style>
        :root {
            --primary: #FFD93D; /* LEGO Gelb */
            --accent: #FF6B35;
            --glass: rgba(255, 255, 255, 0.7);
            --radius: 20px;
            --blur: 15px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #2A3B4C; /* Dunklerer Hintergrund für Kontrast */
            color: #1d1d1f;
            overflow: hidden;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
        }

        .ui-wrapper {
            position: relative;
            z-index: 2;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 100vh;
            padding: 2rem;
        }

        .glass-card {
            pointer-events: auto;
            background: var(--glass);
            backdrop-filter: blur(var(--blur));
            border-radius: var(--radius);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            padding: 2rem;
            max-width: 450px;
            margin: 0 auto;
        }

        .btn-donate {
            background: var(--primary);
            color: black;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 800;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s;
            box-shadow: 0 8px 15px rgba(255, 217, 61, 0.3);
        }

        .btn-donate:hover { transform: translateY(-3px); }

        .lego-stat {
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(0,0,0,0.1);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #FF6B35, #FFD93D);
            transition: width 1s ease;
        }

        #blockTooltip {
            position: fixed;
            pointer-events: none;
            padding: 10px 18px;
            background: rgba(0,0,0,0.85);
            color: white;
            border-radius: 12px;
            font-size: 0.9rem;
            display: none;
            z-index: 100;
        }
        .donor-name { font-weight: 800; color: #FFD93D; }
    </style>
</head>
<body>

    <div id="blockTooltip"></div>
    <div id="canvas-container"></div>

    <div class="ui-wrapper">
        <div class="glass-card">
            <h1 style="font-size: 1.8rem; letter-spacing:-0.03em;">Bauen wir das reale LEGO-Zuhause</h1>
            <p style="color:#555; margin-bottom:1.5rem;">Ein Haus entsteht aus Noppen, Träumen und Vertrauen.</p>
            
            <div class="lego-stat">
                <strong>Fortschritt</strong>
                <span id="lego-percent">0%</span>
            </div>
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <div class="lego-stat" style="color:#777;">
                <span id="lego-module-count">0 Module montiert</span>
                <span>500.000 € Ziel</span>
            </div>

            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="#mitmachen" class="btn-donate">💛 Teil werden & Spenden</a>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js";

        // CONFIG & STATE
        // Wir definieren 10 Haupt-LEGO-Module basierend auf dem Bild
        const LEGO_MODULES = [
            { name: "Ground Base Plate", color: 0x93b584, cost: 5000, geometry: new THREE.BoxGeometry(10, 0.1, 7) }, // Noppen-Textur unten
            { name: "Rock Foundation", color: 0x808080, cost: 15000, geometry: new THREE.BoxGeometry(3, 1.5, 3) }, // Spender-Block Fels
            { name: "Waterfall Feature", color: 0x4da6ff, cost: 5000, geometry: new THREE.BoxGeometry(0.8, 1, 1.2) },
            { name: "Ground Floor White Module", color: 0xffffff, cost: 75000, geometry: new THREE.BoxGeometry(4, 2, 4) }, // Linkes Modul
            { name: "Wood Facade Module (Left)", color: 0xc7a17a, cost: 80000, geometry: new THREE.BoxGeometry(2.5, 4, 1.2) },
            { name: "Wood Facade Module (Right)", color: 0xc7a17a, cost: 80000, geometry: new THREE.BoxGeometry(2.5, 4, 1.2) },
            { name: "Garage & Right Living", color: 0xeeeeee, cost: 120000, geometry: new THREE.BoxGeometry(4.5, 2.5, 4) },
            { name: "Upper Floor Module", color: 0xffffff, cost: 95000, geometry: new THREE.BoxGeometry(5, 1.8, 4) },
            { name: "Roof Garden", color: 0x2f7d32, cost: 15000, geometry: new THREE.BoxGeometry(4, 0.3, 3) },
            { name: "Conifer Trees Assembly", cost: 10000 }, // Eigene Funktion für Bäume
        ];

        let builtModulesCount = 0;
        let totalCostNeeded = LEGO_MODULES.reduce((sum, m) => sum + (m.cost || 0), 0);
        let currentBudget = 0; // Manuell steuern oder simulieren

        // SCENE & RENDERER
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2A3B4C); // Hintergrundfarbe des Bildes
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(-10, 8, 12);
        camera.lookAt(0, 1, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // LIGHTS (Ähnlich wie im Studio-Setup des Bildes)
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(5, 15, 8);
        scene.add(sun);

        // LEGO GROUP
        const legoAssemblyGroup = new THREE.Group();
        scene.add(legoAssemblyGroup);

        // SIMULIERE LEGO NOPEPPEN (Simplified texture)
        // Im realen Code würden wir hier Shader oder Bump-Maps nutzen.
        // Für diese Demo nutzen wir eine helle, vereinfachte Farbe.

        // HELPER FÜR BÄUME (wie im Bild)
        function createLegoTree(pos) {
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5a3b1e });
            const crownMat = new THREE.MeshStandardMaterial({ color: 0x2f7d32 });
            
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 1), trunkMat);
            trunk.position.set(pos.x, 0.5, pos.z);
            legoAssemblyGroup.add(trunk);

            for(let i=0; i<3; i++) {
                const crown = new THREE.Mesh(new THREE.CylinderGeometry(0, 0.7 - i*0.2, 1.2), crownMat);
                crown.position.set(pos.x, 1.2 + i*0.8, pos.z);
                legoAssemblyGroup.add(crown);
            }
        }

        // BUILD LOGIC
        function assembleNextModule() {
            if (builtModulesCount >= LEGO_MODULES.length) return;

            const module = LEGO_MODULES[builtModulesCount];
            let mesh;

            if (module.name === "Conifer Trees Assembly") {
                // Sonderfall Bäume
                createLegoTree({ x: -4, z: -3 });
                createLegoTree({ x: 4, z: 3 });
                createLegoTree({ x: 3, z: -2 });
                // Keine Geometrie für Bäume-Modul selbst
            } else if (module.geometry) {
                const mat = new THREE.MeshStandardMaterial({ color: module.color, roughness: 0.6 });
                mesh = new THREE.Mesh(module.geometry, mat);
                
                // Positionierungs-Logik basierend auf der LEGO Assembly
                switch(builtModulesCount) {
                    case 0: mesh.position.set(0, -0.05, 0); break; // Base
                    case 1: mesh.position.set(-3, 0.75, -1.5); break; // Rock
                    case 2: mesh.position.set(-3, 0.5, -2.5); break; // Waterfall
                    case 3: mesh.position.set(-2, 1, 1.5); break; // GF White
                    case 4: mesh.position.set(-0.8, 2, 2.5); break; // Wood Left
                    case 5: mesh.position.set(1.5, 2, 2.5); break; // Wood Right
                    case 6: mesh.position.set(3, 1.25, -1.5); break; // Garage
                    case 7: mesh.position.set(0.5, 2.9, 0.5); break; // Upper
                    case 8: mesh.position.set(-1, 3.8, 0.5); break; // Roof Garden
                }
                
                mesh.userData.name = module.name;
                mesh.userData.cost = module.cost;
                mesh.userData.donor = "Spendergruppe " + builtModulesCount; // Simulierte Donor

                // Optional: Noppen-Effekt simulieren
                // Wir fügen hier keine Geometrie hinzu, um Performance zu sparen,
                // aber der Shader würde das Noppen-Profil hinzufügen.

                legoAssemblyGroup.add(mesh);
            }

            builtModulesCount++;
            currentBudget += module.cost || 0;
            updateLegoUI();
        }

        // UI UPDATE
        function updateLegoUI() {
            const percent = Math.floor((currentBudget / totalCostNeeded) * 100);
            document.getElementById('progress-fill').style.width = percent + "%";
            document.getElementById('lego-percent').innerText = percent + "%";
            document.getElementById('lego-module-count').innerText = builtModulesCount + " Module montiert";
        }

        // TOOLTIP (Raycaster)
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('blockTooltip');

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(legoAssemblyGroup.children);

            if(intersects.length > 0 && intersects[0].object.userData.donor) {
                const obj = intersects[0].object;
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY + 15) + 'px';
                tooltip.innerHTML = `LEGO-Modul: <strong>${obj.userData.name}</strong><br>Ermöglicht durch <span class="donor-name">${obj.userData.donor}</span>`;
            } else {
                tooltip.style.display = 'none';
            }
        });

        // ANIMATION LOOP
        function animate() {
            requestAnimationFrame(animate);
            legoAssemblyGroup.rotation.y += 0.001; // Sehr langsame Rotation
            renderer.render(scene, camera);
        }

        // WINDOW RESIZE
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // START ASSEMBLING (Simuliert)
        // Wir starten die Montage aller Module mit einer Verzögerung
        function simulatedAssemblyStart() {
            let delay = 1000;
            for(let i=0; i<LEGO_MODULES.length; i++) {
                setTimeout(assembleNextModule, delay);
                delay += 1000; // Jede Sekunde ein neues LEGO-Modul
            }
        }

        animate();
        simulatedAssemblyStart();

    </script>
</body>
</html>
