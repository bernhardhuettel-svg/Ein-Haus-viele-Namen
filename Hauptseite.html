<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Das 500.000 Steine Haus | Ela & Bernhard</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js" type="module"></script>
    <style>
        :root { --primary: #FF6B35; --apple-bg: #f5f5f7; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--apple-bg); overflow: hidden; }
        
        #ui-layer {
            position: absolute; z-index: 10; width: 400px; height: 100vh;
            background: rgba(255,255,255,0.8); backdrop-filter: blur(20px);
            padding: 40px; display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.05);
        }

        .stats { margin-top: auto; padding-bottom: 20px; }
        .bar { width: 100%; height: 8px; background: #ddd; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        #fill { width: 0%; height: 100%; background: var(--primary); transition: width 0.5s; }
        
        #canvas-container { position: absolute; right: 0; top: 0; width: calc(100% - 400px); height: 100vh; }
        
        .btn-donate {
            background: var(--primary); color: white; border: none; padding: 15px;
            border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-donate:hover { transform: scale(1.02); background: #e55a2b; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>Ein Haus,<br>viele Namen.</h1>
        <p>Jeder Stein erzählt eine Geschichte. Wir bauen gemeinsam mit euch das reale Projekt in Schirmitz.</p>
        
        <div style="margin: 20px 0;">
            <div style="display:flex; gap: 10px; align-items: center;">
                <img src="ela.png" style="width:50px; border-radius:50%;" alt="Ela">
                <img src="bernhard.png" style="width:50px; border-radius:50%;" alt="Bernhard">
                <span><b>Ela & Bernhard</b></span>
            </div>
        </div>

        <div class="stats">
            <div style="display:flex; justify-content: space-between; font-weight: bold;">
                <span id="counter">0</span> Steine
                <span id="percent">0%</span>
            </div>
            <div class="bar"><div id="fill"></div></div>
            <button class="btn-donate" onclick="donateStone()">Jetzt 1€ spenden (1 Stein)</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js";

        // --- CONFIG ---
        const STONES_MAX = 500000;
        let currentCount = 142000; // Diesen Wert würdest du später aus deiner Datenbank laden

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf5f5f7);

        const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(15, 12, 15);
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const light = new THREE.PointLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        scene.add(light);

        // --- ENGINE ---
        const geo = new THREE.BoxGeometry(0.12, 0.06, 0.06);
        const mat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const mesh = new THREE.InstancedMesh(geo, mat, STONES_MAX);
        scene.add(mesh);

        const dummy = new THREE.Object3D();

        // Logik für die Platzierung (Wo kommt der nächste Stein hin?)
        function getPos(i) {
            const step = 0.14;
            // 1. Fundament (0 - 100k)
            if (i < 100000) {
                return { x: (i % 316) * step - 22, y: 0, z: Math.floor(i / 316) * step - 22 };
            } 
            // 2. Wände (100k - 400k)
            const wallI = i - 100000;
            const layer = Math.floor(wallI / 1200);
            const side = wallI % 1200;
            let x=0, z=0;
            if(side < 300) { x = side * step - 8; z = -8; }
            else if(side < 600) { x = 8; z = (side-300) * step - 8; }
            else if(side < 900) { x = (side-600) * step - 8; z = 8; }
            else { x = -8; z = (side-900) * step - 8; }
            return { x, y: layer * 0.07 + 0.1, z };
        }

        // Initiales Haus laden (ohne Animation, blitzschnell)
        function fastLoad(count) {
            for (let i = 0; i < count; i++) {
                const p = getPos(i);
                dummy.position.set(p.x, p.y, p.z);
                dummy.updateMatrix();
                mesh.setMatrixAt(i, dummy.matrix);
            }
            mesh.instanceMatrix.needsUpdate = true;
            updateUI();
        }

        // Ein einzelner Stein wird bei Klick/Spende hinzugefügt
        window.donateStone = function() {
            if (currentCount >= STONES_MAX) return;
            const p = getPos(currentCount);
            
            // Animation: Stein fällt von oben herab
            const startY = p.y + 5;
            dummy.position.set(p.x, startY, p.z);
            dummy.updateMatrix();
            mesh.setMatrixAt(currentCount, dummy.matrix);
            
            let progress = 0;
            function fall() {
                progress += 0.1;
                const currentY = startY - (5 * progress);
                dummy.position.set(p.x, Math.max(p.y, currentY), p.z);
                dummy.updateMatrix();
                mesh.setMatrixAt(currentCount, dummy.matrix);
                mesh.instanceMatrix.needsUpdate = true;
                if(progress < 1) requestAnimationFrame(fall);
            }
            fall();

            currentCount++;
            updateUI();
        }

        function updateUI() {
            document.getElementById('counter').innerText = currentCount.toLocaleString();
            const p = (currentCount / STONES_MAX) * 100;
            document.getElementById('fill').style.width = p + "%";
            document.getElementById('percent').innerText = Math.round(p) + "%";
        }

        function animate() {
            requestAnimationFrame(animate);
            mesh.rotation.y += 0.001;
            renderer.render(scene, camera);
        }

        fastLoad(currentCount);
        animate();
    </script>
</body>
</html>
