<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Das Community-LEGO-Haus | Exakte Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js" type="module"></script>
    
    <style>
        :root {
            --primary: #FFD93D; /* LEGO Gelb */
            --glass: rgba(255, 255, 255, 0.7);
            --radius: 20px;
            --blur: 15px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #2A3B4C; /* Hintergrundfarbe des Bildes */
            color: #1d1d1f;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 1. DAS HOCHAUFLÖSENDE BILD ALS HINTERGRUND (PERFEKTE DETAILS) */
        #perfect-house-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; /* Bild wird perfekt skaliert */
            z-index: 1;
        }

        /* 2. DER THREE.JS CANVAS (NUR FÜR DIE FLIEGENDEN STEINE) */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 2; /* Über dem Bild, aber transparent */
            pointer-events: none; /* Klicks gehen durch auf die transparente Layer */
        }

        /* 3. DIE UI UND INTERAKTIONS-LAYER */
        .ui-wrapper {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 100vh;
            padding: 2rem;
            width: 100%;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(var(--blur));
            border-radius: var(--radius);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            padding: 2rem;
            max-width: 450px;
            margin: 0 auto;
            pointer-events: auto;
        }

        .btn-donate {
            background: var(--primary);
            color: black;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 800;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s;
            box-shadow: 0 8px 15px rgba(255, 217, 61, 0.3);
            border: none;
        }

        .btn-donate:hover { transform: translateY(-3px); }

        .lego-stat {
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(0,0,0,0.1);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #FF6B35, #FFD93D);
            transition: width 0.5s ease;
        }

        #blockTooltip {
            position: fixed;
            pointer-events: none;
            padding: 10px 18px;
            background: rgba(0,0,0,0.85);
            color: white;
            border-radius: 12px;
            font-size: 0.9rem;
            display: none;
            z-index: 100;
        }
        .donor-name { font-weight: 800; color: #FFD93D; }

    </style>
</head>
<body>

    <div id="blockTooltip"></div>

    <img src="image_0.png" id="perfect-house-image" alt="Perfektes LEGO Haus Details">

    <div id="canvas-container"></div>

    <div class="ui-wrapper">
        <div class="glass-card">
            <h1 style="font-size: 1.8rem; letter-spacing:-0.03em;">Bauen wir *exakt dieses* Haus</h1>
            <p style="color:#555; margin-bottom:1.5rem;">Jede Noppe, jede Fliese – live simuliert.</p>
            
            <div class="lego-stat">
                <strong>Fortschritt</strong>
                <span id="lego-percent">0%</span>
            </div>
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <div class="lego-stat" style="color:#777;">
                <span id="lego-stone-count">0 Steine gesetzt</span>
                <span>500.000 € Ziel</span>
            </div>

            <div style="text-align: center; margin-top: 1.5rem;">
                <button class="btn-donate" id="sim-donate-btn">💛 Stein setzen & Spenden</button>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js";

        // CONFIG & STATE
        let builtStonesCount = 0;
        const TOTAL_STONES_NEEDED = 500000;

        // SCENE & RENDERER (Transparent)
        const scene = new THREE.Scene();
        // Wir brauchen keinen Hintergrund, da das Bild drunter liegt
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // Wir richten die Kamera so aus, dass sie die "Mitte" des Bildes im 3D-Raum sieht
        camera.position.set(0, 0, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); // Alpha=True für Transparenz
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // LIGHTS (Studio-Beleuchtung für die fliegenden Steine)
        scene.add(new THREE.AmbientLight(0xffffff, 1));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 10, 8);
        scene.add(sun);

        // 3D LEGO STEIN (Ein hochdetaillierter 1x1 Brick mit Noppe)
        // Wir bauen *einen* perfekten Stein über Code, um ihn zu replizieren.
        function createDetailedLegoBrick(color = 0xFFD93D) {
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.5 });
            const group = new THREE.Group();

            // Der Brick-Körper (1x1)
            const brick = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), mat);
            group.add(brick);

            // Die Noppe oben (Zylinder)
            const stud = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.25, 16), mat);
            stud.position.set(0, 0.625, 0);
            group.add(stud);

            return group;
        }

        const flyingStonesGroup = new THREE.Group();
        scene.add(flyingStonesGroup);

        // FUNCTION: FLY IN A NEW DETAILED STONE
        function flyInStone() {
            builtStonesCount++;
            updateUI();

            // Wir erstellen einen neuen, detaillierten Stein (LEGO Gelb)
            const stone = createDetailedLegoBrick();
            
            // Start-Position (außerhalb des Bildschirms)
            stone.position.set(
                (Math.random() - 0.5) * 20, 
                (Math.random() - 0.5) * 20, 
                15
            );
            
            // End-Position (Wir simulieren eine Stelle im Haus)
            // Hier wählen wir eine zufällige Position im Haus-Bereich
            const targetX = (Math.random() - 0.5) * 6; // Mitte des Bildes
            const targetY = (Math.random() - 0.5) * 4; 
            const targetZ = -2;

            stone.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
            flyingStonesGroup.add(stone);

            // ANIMATION (Fly In und Rotate)
            let progress = 0;
            function animateStone() {
                progress += 0.02; // Geschwindigkeit
                if(progress <= 1) {
                    stone.position.x = stone.position.x * (1 - progress) + targetX * progress;
                    stone.position.y = stone.position.y * (1 - progress) + targetY * progress;
                    stone.position.z = stone.position.z * (1 - progress) + targetZ * progress;
                    stone.rotation.y += 0.05;
                    requestAnimationFrame(animateStone);
                } else {
                    // Stein ist angekommen, wir löschen ihn aus der fliegenden Gruppe
                    // (Wir simulieren nur das Wachstum, wir bauen kein 3D Haus)
                    flyingStonesGroup.remove(stone);
                }
            }
            animateStone();
        }

        // UI UPDATE
        function updateUI() {
            const percent = ((builtStonesCount / TOTAL_STONES_NEEDED) * 100).toFixed(2);
            document.getElementById('progress-fill').style.width = percent + "%";
            document.getElementById('lego-percent').innerText = percent + "%";
            document.getElementById('lego-stone-count').innerText = builtStonesCount.toLocaleString('de-DE') + " Steine gesetzt";
        }

        // ANIMATION LOOP
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        // WINDOW RESIZE
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // SIMULIERE SPENDE
        document.getElementById('sim-donate-btn').addEventListener('click', flyInStone);

        animate();
        // Wir simulieren ein paar Steine beim Start
        for(let i=0; i<10; i++) setTimeout(flyInStone, i * 200);

    </script>
</body>
</html>
