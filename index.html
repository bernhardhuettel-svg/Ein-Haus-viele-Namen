<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Hausbau | Stein für Stein</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;700&display=swap');
        
        .pixel-font { font-family: 'Press Start 2P', cursive; }
        .house-container {
            perspective: 1000px;
            height: 300px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 2px;
            flex-wrap: wrap;
            padding: 20px;
        }
        .brick {
            width: 15px; height: 10px;
            background: #e74c3c; border: 1px solid #c0392b;
            box-shadow: 2px 2px 0px #000;
            transition: all 0.3s ease;
        }
        .brick.empty { background: #eee; border: 1px solid #ddd; box-shadow: none; opacity: 0.3; }
        
        .progress-fill {
            transition: width 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans">

    <nav class="p-6 flex justify-between items-center border-b border-slate-800">
        <div class="pixel-font text-yellow-400 text-xs md:text-lg">COMMUNITY-HAUS</div>
        <div class="text-sm bg-green-500 px-4 py-1 rounded-full animate-pulse">LIVE: 1€ = 1 STEIN</div>
    </nav>

    <main class="max-w-4xl mx-auto mt-10 p-4">
        <section class="text-center mb-12">
            <h1 class="text-4xl font-bold mb-4">MassaHaus LifeStyle 16.01 W</h1>
            <p class="text-slate-400 mb-8">Wir bauen gemeinsam ein Zuhause auf 830qm.</p>
            
            <div class="stats mb-2 flex justify-between pixel-font text-[10px]">
                <span id="counter">0</span> € gesammelt
                <span>Ziel: 560.000 €</span>
            </div>
            <div class="w-full bg-slate-800 h-8 rounded-lg overflow-hidden border-2 border-slate-700">
                <div id="progress-bar" class="progress-fill h-full bg-gradient-to-r from-yellow-500 to-green-500" style="width: 0%"></div>
            </div>
        </section>

        <section id="construction-site" class="house-container bg-slate-800 rounded-3xl border-4 border-dashed border-slate-700">
            </section>

        <section class="mt-12 text-center bg-slate-800 p-8 rounded-2xl border border-slate-700">
            <h2 class="text-2xl font-bold mb-4">Werde Teil des Fundaments!</h2>
            <p class="mb-6 text-slate-300">Jeder Stein wird mit deinem Namen in der digitalen Wand verewigt.</p>
            <div class="flex flex-col md:flex-row gap-4 justify-center">
                <a href="DEIN_PAYPAL_LINK" class="bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-4 px-10 rounded-xl transition transform hover:scale-105">
                    1 Stein setzen (1€)
                </a>
                <a href="#" class="bg-slate-700 hover:bg-slate-600 py-4 px-10 rounded-xl transition">
                    Das Projekt teilen
                </a>
            </div>
        </section>
    </main>

    <script>
        // Simulation der Firebase-Logik für die Demo
        const currentAmount = 145000; // Diesen Wert holen wir später aus Firebase
        const totalAmount = 560000;
        
        // Fortschrittsbalken animieren
        const percent = (currentAmount / totalAmount) * 100;
        document.getElementById('progress-bar').style.width = percent + '%';
        document.getElementById('counter').innerText = currentAmount.toLocaleString();

        // Ein paar visuelle Steine generieren
        const site = document.getElementById('construction-site');
        for(let i=0; i<150; i++) {
            const brick = document.createElement('div');
            brick.className = i < 80 ? 'brick' : 'brick empty';
            site.appendChild(brick);
        }
    </script>
</body>
</html>
