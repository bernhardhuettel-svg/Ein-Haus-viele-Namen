<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Ein Haus – viele Namen | Ela & Bernhard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B35; --bg: #f5f5f7; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); display: flex; }
        
        .sidebar {
            width: 450px; height: 100vh; overflow-y: auto;
            background: rgba(255,255,255,0.8); backdrop-filter: blur(20px);
            padding: 50px; box-sizing: border-box; z-index: 10;
        }

        .simulation-frame {
            flex-grow: 1; height: 100vh; border: none; background: white;
        }

        .glass-card {
            background: white; border-radius: 24px; padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px;
        }

        .profile-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
        
        .btn {
            background: var(--primary); color: white; border: none; width: 100%;
            padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer;
        }

        .progress-container { margin-top: auto; padding-top: 20px; }
        .bar { width: 100%; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        #fill { width: 24%; height: 100%; background: var(--primary); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>Ein Haus. Viele Namen.</h1>
        <p>Wir bauen in Schirmitz – Stein für Stein mit euch.</p>

        <div class="glass-card">
            <div style="display:flex; gap:15px; align-items:center;">
                <img src="ela.png" class="profile-img" alt="Ela">
                <img src="bernhard.png" class="profile-img" alt="Bernhard">
                <span><b>Ela & Bernhard</b></span>
            </div>
            <p style="font-size: 0.9rem; margin-top:15px; font-style: italic;">
                "Dieses Projekt gehört der Community. Jeder Euro macht die Vision sichtbarer."
            </p>
        </div>

        <div class="progress-container">
            <div style="display:flex; justify-content:space-between; font-weight:900;">
                <span>120.000 Steine</span>
                <span>24%</span>
            </div>
            <div class="bar"><div id="fill"></div></div>
            <button class="btn" onclick="sendStone()">💛 Jetzt Stein spenden</button>
        </div>
    </div>

    <iframe src="simulation.html" id="sim-frame" class="simulation-frame"></iframe>

    <script>
        function sendStone() {
            const frame = document.getElementById('sim-frame').contentWindow;
            frame.postMessage({ type: 'ADD_STONE', amount: 500 }, '*');
            // Hier würde man normalerweise auch die Bar links updaten
        }
    </script>
</body>
</html>
