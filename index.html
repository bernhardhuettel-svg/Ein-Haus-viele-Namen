<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Project 830 - Stein für Stein</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        .neo-gradient {
            background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.4);
        }
        .text-glow {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-md mx-auto space-y-6">
        
        <div class="text-center pt-8 animate-float">
            <div class="inline-block p-1 rounded-full bg-gradient-to-tr from-cyan-400 to-blue-600 mb-4">
                <div class="bg-slate-900 rounded-full p-2">
                    <svg class="w-12 h-12 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                </div>
            </div>
            <h1 class="text-3xl font-black tracking-tight text-glow">PROJEKT 830<span class="text-cyan-400">QM</span></h1>
            <p class="text-slate-400 font-light mt-2 uppercase tracking-[0.2em] text-[10px]">Community Funded Housing</p>
        </div>

        <div class="glass-card p-6 space-y-4">
            <div class="flex justify-between items-end">
                <div>
                    <p class="text-slate-400 text-xs font-bold uppercase">Gesammelt</p>
                    <h2 class="text-4xl font-black text-white italic">0 €</h2>
                </div>
                <div class="text-right">
                    <p class="text-slate-400 text-xs font-bold uppercase">Ziel</p>
                    <p class="text-lg font-bold">560k €</p>
                </div>
            </div>
            
            <div class="w-full bg-white/5 h-4 rounded-full overflow-hidden">
                <div class="neo-gradient h-full w-[2%] rounded-full transition-all duration-1000"></div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 text-center text-xs">
                <div class="bg-white/5 py-2 rounded-xl border border-white/5">
                    <p class="text-slate-400">Steine gesetzt</p>
                    <p class="font-bold text-cyan-400 text-lg">0</p>
                </div>
                <div class="bg-white/5 py-2 rounded-xl border border-white/5">
                    <p class="text-slate-400">Community</p>
                    <p class="font-bold text-cyan-400 text-lg">1</p>
                </div>
            </div>
        </div>

        <div class="space-y-3">
            <a href="#" class="block w-full py-5 rounded-2xl bg-white text-black font-black text-center shadow-xl hover:scale-[1.02] transition transform active:scale-95">
                1 STEIN SETZEN (1€)
            </a>
            <a href="#" class="block w-full py-4 rounded-2xl glass-card text-white font-bold text-center border-white/20 hover:bg-white/5 transition">
                DIE VISION ANSEHEN
            </a>
            <a href="#" class="block w-full py-4 rounded-2xl glass-card text-white font-bold text-center border-white/20 hover:bg-white/5 transition">
                TRANSPARENZ-CHECK
            </a>
        </div>

        <div class="text-center pt-4">
            <p class="text-slate-500 text-xs">Live Updates auf TikTok @DeinName</p>
            <div class="flex justify-center gap-6 mt-4 opacity-50">
                <div class="w-5 h-5 bg-white rounded-sm"></div>
                <div class="w-5 h-5 bg-white rounded-sm"></div>
                <div class="w-5 h-5 bg-white rounded-sm"></div>
            </div>
        </div>

        <div class="flex justify-center gap-4 text-[10px] text-slate-600 font-bold uppercase pt-8">
            <a href="#">Impressum</a>
            <span>•</span>
            <a href="#">Datenschutz</a>
        </div>

    </div>

</body>
</html>
